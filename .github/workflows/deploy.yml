name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Check if redesign commit
        id: check
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == Redesign:* ]]; then
            echo "is_redesign=true" >> "$GITHUB_OUTPUT"
            # Extract theme name from "Redesign: THEME NAME theme"
            THEME=$(echo "$MSG" | sed 's/^Redesign: //' | sed 's/ theme$//')
            echo "theme=${THEME}" >> "$GITHUB_OUTPUT"
            echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "is_redesign=false" >> "$GITHUB_OUTPUT"
          fi
          # Did this push add or edit a blog post? New/edited posts need their
          # per-post OG card (re)generated even when it isn't a redesign day.
          if git diff --name-only HEAD~1 HEAD -- _posts/ 2>/dev/null | grep -q .; then
            echo "posts_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "posts_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build archive snapshot
        if: steps.check.outputs.is_redesign == 'true'
        run: |
          chmod +x scripts/build_snapshot.sh
          # Find the most recent existing archive date to use as prev_date
          PREV_DATE=""
          if [ -f _data/archive.yml ]; then
            PREV_DATE=$(ruby -ryaml -rdate -e 'a = YAML.load_file("_data/archive.yml", permitted_classes: [Date]) || []; puts a.map { |e| e["date"].to_s }.max' 2>/dev/null || echo "")
          fi
          bash scripts/build_snapshot.sh \
            "${{ steps.check.outputs.commit }}" \
            "${{ steps.check.outputs.date }}" \
            "${{ steps.check.outputs.theme }}" \
            "${PREV_DATE}" \
            ""

      - name: Update archive manifest
        if: steps.check.outputs.is_redesign == 'true'
        run: |
          ruby scripts/update_archive_manifest.rb \
            "${{ steps.check.outputs.date }}" \
            "${{ steps.check.outputs.theme }}" \
            "${{ steps.check.outputs.commit }}"

      - name: Install Playwright browser
        if: steps.check.outputs.is_redesign == 'true' || steps.check.outputs.posts_changed == 'true'
        run: npx -y playwright@1.58.0 install --with-deps chromium

      - name: Capture archive thumbnail
        if: steps.check.outputs.is_redesign == 'true'
        run: |
          chmod +x scripts/capture_screenshots.sh
          PLAYWRIGHT_VERSION=1.58.0 ./scripts/capture_screenshots.sh thumb "${{ steps.check.outputs.date }}"

      - name: Build Jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Capture social/OG image
        if: steps.check.outputs.is_redesign == 'true'
        run: |
          PLAYWRIGHT_VERSION=1.58.0 ./scripts/capture_screenshots.sh shot _site / assets/og/today.png 1200,630
          mkdir -p _site/assets/og
          cp assets/og/today.png _site/assets/og/today.png

      - name: Capture per-post OG cards
        if: steps.check.outputs.is_redesign == 'true' || steps.check.outputs.posts_changed == 'true'
        run: |
          PLAYWRIGHT_VERSION=1.58.0 ./scripts/capture_screenshots.sh ogcards _site assets/og/posts
          mkdir -p _site/assets/og/posts
          cp -r assets/og/posts/. _site/assets/og/posts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit generated assets back to repo
        if: steps.check.outputs.is_redesign == 'true' || steps.check.outputs.posts_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ _data/archive.yml assets/og/
          if [[ "${{ steps.check.outputs.is_redesign }}" == "true" ]]; then
            MSG="Archive: ${{ steps.check.outputs.theme }} (${{ steps.check.outputs.date }}) [skip ci]"
          else
            MSG="Update OG cards [skip ci]"
          fi
          git commit -m "$MSG" || echo "Nothing to commit"
          git push
