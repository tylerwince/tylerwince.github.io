# Current design manifest.
# Rewritten by EVERY redesign (see redesign-site skill). On deploy, CI merges
# these fields into the new _data/archive.yml entry, so this file is both the
# live site's metadata source AND the design's permanent archive record.
#
# Fields:
#   name                  — theme name, ALL CAPS, matches the commit message
#   date                  — design date (YYYY-MM-DD)
#   lane                  — one of: object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "TRUCHET"
date: "2026-06-24"
lane: "generative"
manifesto: >-
  One square, two arcs, an endless weave. Sébastien Truchet's 1704 tile — drawn
  live in your browser, never an image — paves every surface here. Nudge the
  field and the current finds a new path around your pointer.
nav_paradigm: "tile rail — a fixed column of Truchet tiles (monogram + nav); the cerise current threads through the active tile, collapsing to a bottom tile-bar on mobile"
layout_skeleton: "a paved field — oversized name over the live weave, apps as a woven offset of arc-cut tiles, writing as a threaded labyrinth path, reading as a cover quilt set into the grid"
signature_interaction: "the weave draws itself in on load and a cerise current sweeps the name; on pointer-move nearby tiles flip and glow as the current reroutes around you"
color: "#ece3d1"
fonts:
  display: "Jost"
  body: "Newsreader"
  mono: "Red Hat Mono"
palette:
  - "#ece3d1"
  - "#1b1813"
  - "#8b8270"
  - "#e01f63"
