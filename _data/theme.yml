# Current theme manifest. Drives the banner (design № + name), the browser
# theme-color, and the per-post OG cards. CI merges this into _data/archive.yml
# on deploy and captures the snapshot — never edit archive.yml by hand.
#
# Fields:
#   name                  — THEME NAME (all caps), shown in the banner + archive
#   date                  — YYYY-MM-DD, today
#   lane                  — object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "UNIBODY"
date: "2026-07-17"
lane: "digital-native"
manifesto: >-
  Milled from a single block: one typeface, two tones, one accent. Everything
  that couldn't justify itself was machined away — what remains is air, light,
  and the work.
nav_paradigm: "floating frosted capsule — a detached glass pill that condenses as you scroll and folds open into a rounded sheet on small screens"
layout_skeleton: "a product page for a person — statement hero, apps as an asymmetric bento with one inverted tile, writing as an editorial index on a quiet surface band, reading as an edge-bleed cover gallery"
signature_interaction: "the machining pass — the name resolves from soft blur as a specular gleam sweeps across it, like light over brushed aluminum"
color: "#fbfbfd"
fonts:
  display: "Geist"
  body: "Geist"
  mono: "Geist Mono"
palette:
  - "#fbfbfd"
  - "#1d1d1f"
  - "#6e6e73"
  - "#0071e3"
