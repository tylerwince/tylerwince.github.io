# Current theme manifest. Drives the banner (design № + name), the browser
# theme-color, and the per-post OG cards. CI merges this into _data/archive.yml
# on deploy and captures the snapshot — never edit archive.yml by hand.
#
# Fields:
#   name                  — THEME NAME (all caps), shown in the banner + archive
#   date                  — YYYY-MM-DD, today
#   lane                  — object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "ARABESQUE"
date: "2026-06-29"
lane: "design-movement"
manifesto: >-
  Paris, 1900 — the whiplash line takes over. Wrought-iron arches, climbing
  tendrils and gilt rules are drawn live by your browser, never as images;
  every section is a panel in an illuminated programme, and the vines grow
  themselves in the moment you arrive.
nav_paradigm: "the ironwork portal — a wrought-iron lintel with a monogram keystone and scrollwork brackets; nav links hang beneath as enamel cartouche plaques, the active one lit gilt (mobile collapses to a gate latch that swings a full-screen ironwork overlay open)"
layout_skeleton: "an illuminated programme — an arched frontispiece with a climbing margin vine, apps as lancet-arched enamel panels overlapping a vine spine, writing as a drop-cap sommaire on gilt leader lines, reading as a stained-glass gallery of covers in arched gilt frames"
signature_interaction: "the vines grow in — iron scrollwork and the margin tendrils self-draw on load as a gilt shimmer sweeps the name, section vine-spines draw as you scroll, and cover plates bloom from sepia to full colour on hover"
color: "#1c3b30"
fonts:
  display: "Yeseva One"
  body: "Spectral"
  mono: "Cutive Mono"
palette:
  - "#f3ead4"
  - "#1c3b30"
  - "#6e7b6a"
  - "#8f6a1f"
