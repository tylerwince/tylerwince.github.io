# Current design manifest.
# Rewritten by EVERY redesign (see redesign-site skill). On deploy, CI merges
# these fields into the new _data/archive.yml entry, so this file is both the
# live site's metadata source AND the design's permanent archive record.
#
# Fields:
#   name                  — theme name, ALL CAPS, matches the commit message
#   date                  — design date (YYYY-MM-DD)
#   lane                  — one of: object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "OVERPRINT"
date: "2026-06-27"
lane: "digital-native"
manifesto: >-
  Two inks, one sheet, printed live in your browser. Blue and red lie a hair out
  of register until the press locks them in — move your pointer and the colours
  separate again, mixing a third wherever they overlap.
nav_paradigm: "the ink control strip — a fixed bottom colour-bar of labelled ink patches; the active patch inks up solid with a registration tick (same strip on mobile)"
layout_skeleton: "a press sheet under crop marks — a misregistered overprinted name, apps as a colour-bar of ink-chips, writing as a numbered ruled galley, reading as a duotone cover mosaic"
signature_interaction: "live registration — the two ink separations snap into register on load as crop marks draw in, then drift apart under your pointer; covers rack from duotone to full colour on hover"
color: "#16111d"
fonts:
  display: "Bricolage Grotesque"
  body: "Figtree"
  mono: "Sometype Mono"
palette:
  - "#f2ede1"
  - "#1a1322"
  - "#2336e8"
  - "#ff2748"
