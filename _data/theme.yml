# Current design manifest.
# Rewritten by EVERY redesign (see redesign-site skill). On deploy, CI merges
# these fields into the new _data/archive.yml entry, so this file is both the
# live site's metadata source AND the design's permanent archive record.
#
# Fields:
#   name                  — theme name, ALL CAPS, matches the commit message
#   date                  — design date (YYYY-MM-DD)
#   lane                  — one of: object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "TITLE SEQUENCE"
date: "2026-06-26"
lane: "motion-first"
manifesto: >-
  A personal site staged as a film's opening titles. Nothing fades in politely —
  it cuts: kinetic type snaps to its mark, a duotone bar wipes the frame, and
  every section is a scene that hits on cue. Scroll runs the reel.
nav_paradigm: "the cue sheet — a fixed vertical list of numbered scenes with timecodes, a tally light on the active cue; collapses to a bottom scrubber on mobile"
layout_skeleton: "a reel of scenes — full-bleed title-card hero over a wipe bar, apps as a billing block, writing as a shot-list / EDL, reading as a sprocketed filmstrip of lobby cards"
signature_interaction: "the title sequence on load — the cue sheet rolls in and the name cuts up into frame as a duotone bar wipes across; thereafter each scene cuts itself in on scroll-entry, the cue sheet's tally tracks the scene you're in, and clicking a cue re-cues that scene"
color: "#0c0c0f"
fonts:
  display: "Anton"
  body: "Instrument Sans"
  mono: "Overpass Mono"
palette:
  - "#ece9e0"
  - "#16161a"
  - "#1f2fff"
  - "#e8331c"
