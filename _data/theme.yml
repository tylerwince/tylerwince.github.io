# Current theme manifest. Drives the banner (design № + name), the browser
# theme-color, and the per-post OG cards. CI merges this into _data/archive.yml
# on deploy and captures the snapshot — never edit archive.yml by hand.
#
# Fields:
#   name                  — THEME NAME (all caps), shown in the banner + archive
#   date                  — YYYY-MM-DD, today
#   lane                  — object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "THE PINBALL AUTHOR"
date: "2026-07-10"
lane: "object-metaphor"
manifesto: >-
  A personal site built as an electromechanical pinball table. Apps are pop
  bumpers, essays are rollover lanes, and books stand in a bank of drop
  targets — launch the ball and keep the work in play.
nav_paradigm: "the backglass scorebox — identity, live score and numbered page reels share a cabinet marquee; on mobile the backglass hinges open into a full-screen route selector"
layout_skeleton: "a playable cabinet — reading drop targets beside a plunger-lane hero, three circular app bumpers, long essay rollovers, service-manual interiors and a coin-door footer"
signature_interaction: "launch ball — a live steel ball ricochets around the viewport, flashes any visible targets it strikes and advances the electromechanical score reel"
color: "#160909"
fonts:
  display: "Bowlby One SC"
  body: "Chivo"
  mono: "Roboto Mono"
palette:
  - "#160909"
  - "#f3e4bb"
  - "#ef3e36"
  - "#42c8b4"
  - "#ffd23f"
