# Current design manifest.
# Rewritten by EVERY redesign (see redesign-site skill). On deploy, CI merges
# these fields into the new _data/archive.yml entry, so this file is both the
# live site's metadata source AND the design's permanent archive record.
#
# Fields:
#   name                  — theme name, ALL CAPS, matches the commit message
#   date                  — design date (YYYY-MM-DD)
#   lane                  — one of: object-metaphor | design-movement | pure-typography |
#                           motion-first | generative | digital-native
#   manifesto             — 1–2 sentence point of view, written for visitors
#   nav_paradigm          — short label for the navigation mechanism
#   layout_skeleton       — short label for the homepage spatial structure
#   signature_interaction — the one memorable interaction this theme ships
#   color                 — browser theme-color (also used for archive swatch fallback)
#   fonts                 — display / body / mono families used
#   palette               — 3–5 representative hexes, bg first, accent last

name: "METROPOLIS"
date: "2026-06-23"
lane: "design-movement"
manifesto: >-
  Art Deco for the machine age — gilt sunbursts, stepped skylines, chevron
  friezes, every section mirrored on a central spine. A personal site built like
  the lobby of a 1929 skyscraper, and the marquee lights itself the moment you
  arrive.
nav_paradigm: "the marquee crown — a symmetric multi-tier masthead: monogram medallion, spaced-caps title between chevron rules, nav links split by diamonds inside a stepped gold frame; full-screen playbill overlay on mobile"
layout_skeleton: "a symmetric Deco facade — gilt hero over a CSS sunburst, apps as a skyline of stepped setback towers, writing as a centered theater program, reading as a gold-framed lobby gallery"
signature_interaction: "the grand opening — sunburst rays sweep in, chevron rules draw outward from centre, and a single gilt shimmer passes across the name on load"
color: "#16211f"
fonts:
  display: "Poiret One"
  body: "EB Garamond"
  mono: "DM Mono"
palette:
  - "#f1e7d0"
  - "#16211f"
  - "#857a5f"
  - "#9c7c2c"
