<a href="{% if include.book.content != '' %}{{ include.book.url }}{% else %}#{% endif %}" class="ed-book-line" {% if include.last_name %} data-last-name="{{ include.last_name }}"{% endif %} {% if include.book.genre %} data-genre="{{ include.book.genre }}"{% endif %}>
  <div class="ed-bl-title">{{ include.book.title | upcase }}</div>
  <div class="ed-bl-author">{{ include.book.author | upcase }}</div>
  <div class="ed-bl-rating">
    {% if include.unrated %}
      [NR]
    {% else %}
      {% if include.book.currently_reading %}
        [IN PROG]
      {% elsif include.book.stars %}
        {% for i in (1..include.book.stars) %}★{% endfor %}
      {% endif %}
    {% endif %}
  </div>
</a>
