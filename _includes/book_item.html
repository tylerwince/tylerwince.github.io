<a href="{% if include.book.content != '' %}{{ include.book.url }}{% else %}#{% endif %}" class="book-line"{% if include.last_name %} data-last-name="{{ include.last_name }}"{% endif %}{% if include.book.genre %} data-genre="{{ include.book.genre }}"{% endif %}>
  <span class="book-line-title">{{ include.book.title }}</span>
  <span class="book-line-author">{{ include.book.author }}</span>
  <span class="book-line-rating">
    {% if include.unrated %}
      &mdash;
    {% else %}
      {% if include.book.currently_reading %}
        reading
      {% elsif include.book.stars %}
        {% for i in (1..include.book.stars) %}&#9733;{% endfor %}
      {% endif %}
    {% endif %}
  </span>
</a>
