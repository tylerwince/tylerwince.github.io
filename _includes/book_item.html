<a href="{% if include.book.content != '' %}{{ include.book.url }}{% else %}#{% endif %}" class="post-index-row connect-point" {% if include.last_name %} data-last-name="{{ include.last_name }}"{% endif %}{% if include.book.genre %} data-genre="{{ include.book.genre }}"{% endif %} data-id="book-idx-{{ include.book.title | slugify }}">
  <div class="post-index-title">{{ include.book.title | escape }}</div>
  <div class="post-index-date">{{ include.book.author | escape }}</div>
  <div class="post-index-desc">
    Status: {% if include.unrated %}Unrated{% else %}{% if include.book.currently_reading %}Active Analysis{% elsif include.book.stars %}Priority Level {{ include.book.stars }}{% endif %}{% endif %}
  </div>
</a>
