<footer class="site-footer">
  <div class="footer-field" aria-hidden="true"></div>
  <div class="footer-grid">
    <div class="footer-col footer-col--mark">
      <span class="footer-monogram" aria-hidden="true"></span>
      <div class="footer-col-title">Tyler Wince</div>
      <p class="footer-note">One ink. Two frequencies.<br>Redesigned daily.</p>
    </div>

    <div class="footer-col">
      <div class="footer-col-title">site</div>
      <a href="{{ '/' | relative_url }}">home</a>
      <a href="{{ '/now/' | relative_url }}">/now</a>
      <a href="{{ '/archive/' | relative_url }}">design archive</a>
    </div>

    <div class="footer-col">
      <div class="footer-col-title">elsewhere</div>
      <ul class="social-list">
        {% if site.github_username %}
        <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a></li>
        {% endif %}
        {% if site.twitter_username %}
        <li><a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">Twitter</a></li>
        {% endif %}
        <li><a href="https://www.linkedin.com/in/tylerwince" target="_blank" rel="noopener">LinkedIn</a></li>
      </ul>
    </div>
  </div>
</footer>
