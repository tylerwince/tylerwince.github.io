<footer class="ed-footer">
  <div class="ed-footer-line"></div>
  <div class="ed-footer-grid">
    <div class="ed-footer-col">
      <div class="ed-col-title">LOCATION</div>
      <p>INTERNET, GLOBAL</p>
    </div>
    <div class="ed-footer-col">
      <div class="ed-col-title">SOCIAL</div>
      <ul class="ed-social-list">
        {% if site.github_username %}
        <li><a href="https://github.com/{{ site.github_username }}">GITHUB</a></li>
        {% endif %}
        {% if site.twitter_username %}
        <li><a href="https://twitter.com/{{ site.twitter_username }}">TWITTER</a></li>
        {% endif %}
        <li><a href="https://www.linkedin.com/in/tylerwince">LINKEDIN</a></li>
      </ul>
    </div>
    <div class="ed-footer-col">
      <div class="ed-col-title">COLOPHON</div>
      <p>&copy; {{ site.time | date: "%Y" }} TYLER WINCE.<br>ALL RIGHTS RESERVED.</p>
    </div>
  </div>
</footer>
