<!-- THE IRONWORK PORTAL : a Guimard Métropolitain entrance. The imprint is a
     gilt monogram keystone (top-left); primary nav hangs from a wrought-iron
     lintel as enamel cartouche plaques, the active one lit gilt with a rivet.
     On mobile the lintel collapses to a gate latch that swings a full-screen
     ironwork overlay open. The site.header_pages loop is preserved. -->
<header class="site-header">
  <div class="portal-bar">
    <a class="site-title" href="{{ '/' | relative_url }}" aria-label="Tyler Wince — home">
      <span class="site-title-mark" aria-hidden="true"><span class="monogram">TW</span></span>
      <span class="site-title-group">
        <span class="site-title-text">Tyler&nbsp;Wince</span>
        <span class="site-title-sub" aria-hidden="true">essays · iOS apps · book notes</span>
      </span>
    </a>

    <button class="nav-toggle" id="nav-toggle" type="button"
            aria-expanded="false" aria-controls="site-nav" aria-label="Open the gate">
      <span class="nav-toggle-latch" aria-hidden="true"></span>
      <span class="nav-toggle-text">gate</span>
    </button>
  </div>

  <nav class="site-nav" id="site-nav" aria-label="Primary">
    <svg class="nav-scroll nav-scroll--l" viewBox="0 0 64 40" fill="none" aria-hidden="true">
      <path class="vine-stroke" pathLength="1" d="M0 20 H28 C40 20 46 9 39 7 C34 5.5 33 12 38 12.5 C42 13 43 9.5 41 8"/>
    </svg>
    <ul class="nav-list">
      <li class="nav-item nav-item--home">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active" aria-current="page"{% endif %}>
          <span class="plaque-rivet" aria-hidden="true"></span>
          <span class="nav-name">home</span>
        </a>
      </li>
      {% for nav_page_name in site.header_pages %}
        {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
        {% if nav_page %}
        <li class="nav-item nav-item--{{ forloop.index }}">
          <a href="{{ nav_page.url | relative_url }}"{% if page.url contains nav_page.url %} class="active" aria-current="page"{% endif %}>
            <span class="plaque-rivet" aria-hidden="true"></span>
            <span class="nav-name">{{ nav_page.title | downcase }}</span>
          </a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>
    <svg class="nav-scroll nav-scroll--r" viewBox="0 0 64 40" fill="none" aria-hidden="true">
      <path class="vine-stroke" pathLength="1" d="M0 20 H28 C40 20 46 9 39 7 C34 5.5 33 12 38 12.5 C42 13 43 9.5 41 8"/>
    </svg>
  </nav>
</header>
