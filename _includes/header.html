<header class="site-header">
  <h1 class="site-title"><a href="{{ '/' | relative_url }}">tyler wince</a></h1>

  <nav class="site-nav" aria-label="Primary">
    <ul class="nav-list">
      {% for nav_page_name in site.header_pages %}
        {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
        {% if nav_page %}
        <li class="nav-item">
          <a href="{{ nav_page.url | relative_url }}" class="{% if page.url contains nav_page.url %}active{% endif %}">/{{ nav_page.title | downcase }}</a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</header>
