<header class="case-file-nav connect-point" data-id="nav">
  <div class="nav-title">Suspect: Tyler Wince</div>
  <nav class="nav-links">
    <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Profile</a>
    {% for nav_page_name in site.header_pages %}
      {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
      {% if nav_page %}
      <a href="{{ nav_page.url | relative_url }}" class="{% if page.url contains nav_page.url %}active{% endif %}">
        {{ nav_page.title }}
      </a>
      {% endif %}
    {% endfor %}
    <a href="{{ '/archive/' | relative_url }}" class="{% if page.url contains '/archive/' %}active{% endif %}">Archive File</a>
  </nav>
</header>
