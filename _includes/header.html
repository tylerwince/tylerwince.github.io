<header class="site-header">
  <div class="site-title">
    <a href="{{ '/' | relative_url }}">Tyler Wince</a>
  </div>
  <nav class="site-nav">
    <ul class="nav-list">
      {% for nav_page_name in site.header_pages %}
        {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
        {% if nav_page %}
        <li class="nav-item">
          <a href="{{ nav_page.url | relative_url }}">{{ nav_page.title }}</a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</header>
