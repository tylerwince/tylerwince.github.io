<!-- THE RIBBON MARKERS : navigation as silk bookmark ribbons hanging over the
     top edge of the page, one per destination, swallowtail-cut, labels reading
     down the ribbon. The current page's ribbon hangs longest. On small screens
     the ribbons retract and a "contents" tassel unrolls them over the page.
     The site.header_pages loop is preserved. -->
<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}" aria-label="Tyler Wince — home">
    <svg class="manicule-glyph site-title-hand" viewBox="0 0 44 26" aria-hidden="true">
      <rect x="0.5" y="5.5" width="6" height="15" rx="1" fill="currentColor"/>
      <path fill="currentColor" d="M8 7 C10 5.6 13 5 15.6 5.6 L18 6.2 L39.5 7.4 A2.3 2.3 0 0 1 39.5 12 L19 12.6 C21.4 13.1 22.4 14 22.1 15.2 C21.8 16.4 19.8 16.7 18 16.3 C20 17 20.9 18 20.5 19.1 C20.1 20.2 18 20.4 16.4 19.9 C17.8 20.7 18 21.8 17 22.5 C15.4 23.6 12 22.9 10.2 21.6 C8.6 20.4 8 18.6 8 16.5 Z"/>
    </svg>
    <span class="site-title-text">Tyler&nbsp;Wince</span>
    <span class="site-title-sub">essays&nbsp;· iOS&nbsp;apps&nbsp;· book&nbsp;notes</span>
  </a>

  <button class="nav-toggle" id="nav-toggle" type="button"
          aria-expanded="false" aria-controls="site-nav" aria-label="Open the contents">
    <span class="nav-toggle-tassels" aria-hidden="true"><i></i><i></i><i></i></span>
    <span class="nav-toggle-text">contents</span>
  </button>

  <nav class="site-nav" id="site-nav" aria-label="Primary">
    <ul class="nav-list">
      <li class="nav-item nav-item--home">
        <a class="ribbon{% if page.url == '/' %} active{% endif %}" href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>
          <span class="ribbon-label">home</span>
        </a>
      </li>
      {% for nav_page_name in site.header_pages %}
        {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
        {% if nav_page %}
        <li class="nav-item nav-item--{{ forloop.index }}">
          <a class="ribbon{% if page.url contains nav_page.url %} active{% endif %}" href="{{ nav_page.url | relative_url }}"{% if page.url contains nav_page.url %} aria-current="page"{% endif %}>
            <span class="ribbon-label">{{ nav_page.title | downcase }}</span>
          </a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</header>
