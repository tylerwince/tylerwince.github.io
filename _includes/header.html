<header class="control-panel">
  <div class="brand-plate">
    TYLER WINCE
    <span>HIGH-FIDELITY PRODUCT DESIGN</span>
  </div>

  <nav class="nav-buttons">
    <a href="{{ '/' | relative_url }}" class="push-button {% if page.url == '/' %}active{% endif %}">
      <div class="button-label">HOME</div>
    </a>
    
    {% for nav_page_name in site.header_pages %}
      {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
      {% if nav_page %}
      <a href="{{ nav_page.url | relative_url }}" class="push-button {% if page.url contains nav_page.url %}active{% endif %}">
        <div class="button-label">{{ nav_page.title }}</div>
      </a>
      {% endif %}
    {% endfor %}

    <a href="{{ '/archive/' | relative_url }}" class="push-button {% if page.url contains '/archive/' %}active{% endif %}">
      <div class="button-label">ARCHIVE</div>
    </a>
  </nav>
</header>
