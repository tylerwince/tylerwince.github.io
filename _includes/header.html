<header class="ed-header">
  <h1 class="ed-title">
    <a href="{{ '/' | relative_url }}">
      <span class="ed-title-part">TYLER</span>
      <span class="ed-title-part">WINCE</span>
    </a>
  </h1>
  <div class="ed-subtitle">SOFTWARE<br>ENGINEERING<br>& SYSTEMS</div>
  
  <nav class="ed-nav">
    <ol class="ed-nav-list">
      <li class="ed-nav-item">
        <a href="{{ '/' | relative_url }}">HOME</a>
      </li>
      {% for nav_page_name in site.header_pages %}
        {% assign nav_page = site.pages | where: "name", nav_page_name | first %}
        {% if nav_page %}
        <li class="ed-nav-item">
          <a href="{{ nav_page.url | relative_url }}">{{ nav_page.title | upcase }}</a>
        </li>
        {% endif %}
      {% endfor %}
    </ol>
  </nav>
</header>
