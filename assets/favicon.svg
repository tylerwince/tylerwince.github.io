<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- SLIPSTREAM — speed-lines drawn against the current. Redesigns replace this file. -->
  <rect width="64" height="64" rx="12" fill="#16150f"/>
  <!-- accent slipstream bar -->
  <rect x="0" y="27" width="64" height="10" fill="#c6f135"/>
  <!-- motion lines being thrown to the left -->
  <g stroke="#f2f0e8" stroke-width="5" stroke-linecap="round">
    <line x1="14" y1="16" x2="40" y2="16"/>
    <line x1="8"  y1="48" x2="34" y2="48"/>
  </g>
  <!-- leading edge chevron -->
  <path d="M40 8 L56 32 L40 56" fill="none" stroke="#16150f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
