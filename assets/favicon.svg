<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TW">
  <!-- UNIBODY — one block, one mark. Redesigns replace this. -->
  <style>
    .plate { fill: #1d1d1f; }
    .mark  { fill: #fbfbfd; }
    @media (prefers-color-scheme: dark) {
      .plate { fill: #f5f5f7; }
      .mark  { fill: #1d1d1f; }
    }
  </style>
  <rect class="plate" x="2" y="2" width="60" height="60" rx="15"/>
  <text class="mark" x="32" y="41.5" text-anchor="middle"
        font-family="Geist, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="25" font-weight="600" letter-spacing="-1.5">TW</text>
</svg>
