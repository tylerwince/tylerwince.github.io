<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- METROPOLIS — an Art Deco emblem: a gilt sunburst rising over a stepped skyline. Redesigns replace this file. -->
  <rect width="64" height="64" rx="10" fill="#16211f"/>
  <!-- sunburst rays -->
  <g fill="#c9a64a">
    <path d="M32 8 L30 30 L34 30 Z"/>
    <path d="M19 12 L29 30 L31.5 28 Z"/>
    <path d="M45 12 L35 30 L32.5 28 Z"/>
    <path d="M9 22 L29 31 L30 28.5 Z"/>
    <path d="M55 22 L35 31 L34 28.5 Z"/>
  </g>
  <circle cx="32" cy="31" r="4.5" fill="#efe3b6"/>
  <!-- stepped skyline -->
  <g fill="#c9a64a">
    <rect x="12" y="46" width="8" height="10"/>
    <rect x="22" y="40" width="7" height="16"/>
    <rect x="30.5" y="34" width="3" height="22"/>
    <rect x="35" y="40" width="7" height="16"/>
    <rect x="44" y="46" width="8" height="10"/>
  </g>
  <rect x="8" y="56" width="48" height="3" fill="#efe3b6"/>
</svg>
