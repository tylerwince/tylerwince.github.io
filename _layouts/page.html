---
layout: default
---

<div class="page-container">
  <div class="page-header">
    <h1>{{ page.title | upcase }}</h1>
    {% if page.description %}
      <div style="font-size: 1.5rem; font-weight: 600; margin-top: 20px;">
        {{ page.description }}
      </div>
    {% endif %}
  </div>

  <div class="page-content">
    {{ content }}
  </div>
</div>
