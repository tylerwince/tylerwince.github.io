---
layout: default
---

<div class="cli-page">
  <div class="cli-command">cat {{ page.title | downcase | replace: ' ', '_' }}.txt</div>
  <div class="cli-output">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p style="color: var(--color-text-muted);">// {{ page.description }}</p>
    {% endif %}
    
    <hr>

    <div class="page-content">
      {{ content }}
    </div>
  </div>
</div>
