---
layout: default
---

<div class="oracle-page">
  <div class="oracle-header">
    <h1>{{ page.title | upcase }}</h1>
    {% if page.description %}
      <div style="font-style: italic; color: var(--parchment-dim); margin-top: 15px;">
        {{ page.description }}
      </div>
    {% endif %}
  </div>
  
  <hr>

  <div class="oracle-content">
    {{ content }}
  </div>
</div>
