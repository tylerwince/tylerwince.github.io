---
layout: default
---
<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title | escape }}</h1>
    {% if page.description %}
    <p class="article-description">{{ page.description | escape }}</p>
    {% endif %}
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
