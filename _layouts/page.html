---
layout: default
---

<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    {% if page.description %}
    <div class="article-description">{{ page.description }}</div>
    {% endif %}
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
