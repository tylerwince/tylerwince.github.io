---
layout: default
---

<div class="receipt-page">
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="font-size: 1.5em;">{{ page.title | upcase }}</h1>
    {% if page.description %}
      <div style="border: 1px dashed var(--color-ink); padding: 10px; margin: 15px 0;">
        {{ page.description | upcase }}
      </div>
    {% endif %}
  </div>
  <hr>

  <div class="page-content receipt-body-text">
    {{ content }}
  </div>
</div>
