---
layout: default
---
<article class="document-wrapper">
  <div class="tape" style="width: 150px; height: 35px; top: -15px; right: 40px; transform: rotate(4deg);"></div>
  <div class="tape" style="width: 100px; height: 35px; bottom: -15px; left: 40px; transform: rotate(-3deg);"></div>
  
  <div class="document-header">
    <div class="document-title">{{ page.title | escape }}</div>
    {% if page.description %}
    <div class="document-meta">{{ page.description | escape }}</div>
    {% endif %}
  </div>

  <div class="document-content">
    {{ content }}
  </div>
</article>
