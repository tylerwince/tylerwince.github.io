---
layout: default
---
<article class="document-wrapper">
  <div class="document-header">
    <div class="document-title">{{ page.title | escape }}</div>
    <div class="document-meta">PLATFORM SPEC: {{ page.platform }} &bull; BUILD STACK: {{ page.tech_stack | join: ' + ' }}</div>
    {% if page.app_store_link %}
    <div class="document-meta">
      <a href="{{ page.app_store_link }}" target="_blank" rel="noopener">SIGNAL OUTPUT: DOWNLOAD ON APP STORE</a>
    </div>
    {% endif %}
  </div>

  <div class="document-content">
    <div class="panel-label">COMPONENT TAGLINE</div>
    <h2 style="margin-top: 0;">{{ page.tagline }}</h2>
    
    <div id="app-content-body">
      {{ content }}
    </div>
  </div>
</article>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // --- Carousel Logic ---
  const screenshotStrip = document.querySelector('.screenshot-strip');
  if (screenshotStrip) {
    const images = Array.from(screenshotStrip.querySelectorAll('img'));
    if (images.length > 0) {
      // Create carousel structure
      const display = document.createElement('div');
      display.className = 'oscilloscope-display';
      
      const viewport = document.createElement('div');
      viewport.className = 'carousel-viewport';
      
      const controls = document.createElement('div');
      controls.className = 'carousel-controls';
      
      images.forEach((img, idx) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        // Clean up image styles
        img.removeAttribute('style');
        slide.appendChild(img);
        viewport.appendChild(slide);
        
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (idx === 0 ? ' active' : '');
        dot.addEventListener('click', () => {
          viewport.scrollTo({
            left: viewport.offsetWidth * idx,
            behavior: 'smooth'
          });
        });
        controls.appendChild(dot);
      });
      
      display.appendChild(viewport);
      display.appendChild(controls);
      
      // Sync dots with scroll
      viewport.addEventListener('scroll', () => {
        const activeIdx = Math.round(viewport.scrollLeft / viewport.offsetWidth);
        controls.querySelectorAll('.carousel-dot').forEach((dot, idx) => {
          dot.classList.toggle('active', idx === activeIdx);
        });
      });
      
      // Replace original strip
      screenshotStrip.parentNode.replaceChild(display, screenshotStrip);
    }
  }

  // --- Etch Stack Loader ---
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName;
      if (countEl) countEl.textContent = cardCount + ' cards';
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
    }
  });
});
</script>
