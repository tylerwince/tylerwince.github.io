---
layout: default
---

<article class="app-paper-wrap">
  <section class="paper-sheet app-hero" data-reveal>
    <div class="app-hero-main">
      <div class="app-hero-icon">
        <img src="{{ page.icon_path }}" alt="{{ page.title }} icon" class="app-hero-icon-img">
      </div>

      <div class="app-hero-info">
        <span class="eyebrow mb-3">Application</span>
        <h1 class="app-hero-title">{{ page.title }}</h1>
        <p class="app-hero-tagline">{{ page.tagline }}</p>
      </div>
    </div>

    <div class="app-hero-meta">
      <div class="meta-label-card">
        <span class="meta-label-key">Platform</span>
        <span class="meta-label-val">{{ page.platform }}</span>
      </div>

      <div class="meta-label-card">
        <span class="meta-label-key">Stack</span>
        <span class="meta-label-val">{{ page.tech_stack | join: ", " }}</span>
      </div>

      <a href="{{ page.app_store_link }}" class="button" target="_blank" rel="noopener">
        Download &rarr;
      </a>
    </div>
  </section>

  <section class="paper-sheet app-body" data-reveal>
    <div class="app-body-inner">
      {{ content }}
    </div>
  </section>
</article>

<style>
.app-paper-wrap {
  width: min(var(--max-width-content), 100%);
  margin: 0 auto;
  display: grid;
  gap: 20px;
}

.app-hero {
  padding: clamp(20px, 3vw, 32px);
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(200px, 300px);
  gap: 20px;
  align-items: start;
  transform: rotate(-0.2deg);
}

.app-hero-main {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 16px;
  align-items: center;
}

.app-hero-icon {
  width: clamp(72px, 10vw, 110px);
  height: clamp(72px, 10vw, 110px);
  border-radius: 22px;
  border: 1px solid var(--color-border);
  padding: 8px;
  background: var(--color-paper-warm);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.08);
}

.app-hero-icon-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
}

.app-hero-info { min-width: 0; }

.app-hero-title {
  margin: 0;
  font-size: clamp(40px, 7vw, 80px);
  line-height: 1;
}

.app-hero-tagline {
  margin: 8px 0 0;
  font-family: var(--font-hand);
  font-size: clamp(18px, 2vw, 24px);
  color: var(--color-text-secondary);
  max-width: 30ch;
}

.app-hero-meta {
  display: grid;
  gap: 10px;
  align-content: start;
}

.meta-label-card {
  padding: 10px 14px;
  background: var(--color-paper-warm);
  border: 1px dashed var(--color-border);
}

.meta-label-key {
  display: block;
  font-family: var(--font-hand);
  font-size: 15px;
  color: var(--color-text-muted);
  margin-bottom: 2px;
}

.meta-label-val {
  display: block;
  font-size: 0.95rem;
  color: var(--color-text-secondary);
}

.app-body {
  padding: clamp(20px, 3vw, 32px);
}

.app-body-inner {
  max-width: var(--max-width-text);
  margin: 0 auto;
  font-family: var(--font-serif);
  font-size: 1.08rem;
  color: var(--color-text-secondary);
}

.app-body-inner h2,
.app-body-inner h3,
.app-body-inner h4,
.app-body-inner h5,
.app-body-inner h6 {
  margin-top: 2rem;
  margin-bottom: 0.5rem;
}

.app-body-inner h2 { font-size: clamp(28px, 5vw, 48px); }
.app-body-inner h3 { font-size: clamp(22px, 3.5vw, 36px); }

.app-body-inner a {
  color: var(--color-blue);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.app-body-inner a:hover { color: var(--color-pin); }

@media (max-width: 900px) {
  .app-hero {
    grid-template-columns: 1fr;
    transform: none;
  }
}

@media (max-width: 600px) {
  .app-hero-main {
    grid-template-columns: 1fr;
  }

  .app-hero-title {
    font-size: clamp(36px, 14vw, 64px);
  }
}
</style>

<script>
// Load and display Etch stack information
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');

  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;

    try {
      var response = await fetch(etchUrl);
      var data = await response.json();

      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;

      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');

      if (titleEl) titleEl.textContent = stackName;
      if (countEl) countEl.textContent = cardCount + ' card' + (cardCount !== 1 ? 's' : '');

      card.classList.remove('stack-card-loading');
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
      var titleEl = card.querySelector('.stack-card-title');
      if (titleEl) titleEl.textContent = 'Error loading stack';
      card.classList.remove('stack-card-loading');
    }
  });
});
</script>
