---
layout: default
---

<article class="ed-article">
  <header class="ed-article-header">
    <div class="ed-article-kicker">PRODUCT SHOWCASE // {{ page.platform | upcase }}</div>
    <h1 class="ed-article-title">{{ page.title | upcase }}</h1>
    <div class="ed-article-lede">{{ page.tagline }}</div>
  </header>
  
  <div class="ed-article-meta">
    <div class="ed-meta-item">
      <strong>COMPONENTS</strong>
      <span>{{ page.tech_stack | join: ", " | upcase }}</span>
    </div>
    <div class="ed-meta-item">
      <strong>AVAILABILITY</strong>
      <a href="{{ page.app_store_link }}" target="_blank" rel="noopener">DOWNLOAD NOW &rarr;</a>
    </div>
  </div>
  
  <div class="ed-article-body">
    {{ content }}
  </div>
</article>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName.toUpperCase();
      if (countEl) countEl.textContent = cardCount + ' ITEMS';
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
    }
  });
});
</script>
