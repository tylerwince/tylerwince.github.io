---
layout: default
---

<article class="app-packet">
  <section class="packet-hero" data-reveal>
    <div class="packet-hero-main">
      <div class="packet-icon-frame">
        <img src="{{ page.icon_path }}" alt="{{ page.title }} icon" class="packet-icon-image">
      </div>

      <div class="packet-title-group">
        <span class="packet-eyebrow">Application Profile</span>
        <h1 class="packet-title">{{ page.title }}</h1>
        <p class="packet-tagline">{{ page.tagline }}</p>
      </div>
    </div>

    <div class="packet-hero-side">
      <div class="packet-meta-chip">
        <span class="packet-meta-label">Platform</span>
        <span class="packet-meta-value">{{ page.platform }}</span>
      </div>

      <div class="packet-meta-chip">
        <span class="packet-meta-label">Stack</span>
        <span class="packet-meta-value">{{ page.tech_stack | join: ", " }}</span>
      </div>

      <a href="{{ page.app_store_link }}" class="button" target="_blank" rel="noopener">
        Download &rarr;
      </a>
    </div>
  </section>

  <section class="packet-content" data-reveal>
    <div class="packet-content-notes">
      {{ content }}
    </div>
  </section>
</article>

<style>
.app-packet {
  width: min(var(--max-width-content), 100%);
  margin: 0 auto;
  display: grid;
  gap: clamp(14px, 2vw, 22px);
}

.packet-hero,
.packet-content {
  border: 1px solid var(--color-panel-border);
  border-radius: var(--border-radius-xl);
  background: linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(240, 233, 219, 0.88));
  box-shadow: var(--shadow-sm);
}

.packet-hero {
  padding: clamp(16px, 3vw, 28px);
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
  gap: 16px;
  align-items: stretch;
}

.packet-hero-main {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 16px;
  align-items: center;
}

.packet-icon-frame {
  width: clamp(84px, 10vw, 120px);
  height: clamp(84px, 10vw, 120px);
  border-radius: 28px;
  border: 1px solid var(--color-border-light);
  background: rgba(255, 255, 255, 0.76);
  padding: 10px;
  box-shadow: var(--shadow-sm);
}

.packet-icon-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 22px;
}

.packet-title-group {
  min-width: 0;
}

.packet-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-text-muted);
}

.packet-eyebrow::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--color-accent);
}

.packet-title {
  margin: 0;
  font-size: clamp(56px, 9vw, 106px);
  line-height: 0.86;
  letter-spacing: 0.03em;
}

.packet-tagline {
  margin: 10px 0 0;
  max-width: 34ch;
  font-family: var(--font-serif);
  font-size: clamp(1rem, 1.4vw, 1.15rem);
  color: var(--color-text-secondary);
}

.packet-hero-side {
  display: grid;
  gap: 10px;
  align-content: start;
}

.packet-meta-chip {
  border: 1px solid var(--color-border-light);
  border-radius: 14px;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.64);
}

.packet-meta-label {
  display: block;
  margin-bottom: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--color-text-muted);
}

.packet-meta-value {
  display: block;
  font-size: 0.94rem;
  color: var(--color-text-secondary);
}

.packet-content {
  padding: clamp(16px, 3vw, 30px);
}

.packet-content-notes {
  max-width: var(--max-width-text);
  margin: 0 auto;
  font-family: var(--font-serif);
  font-size: 1.1rem;
  color: var(--color-text-secondary);
}

.packet-content-notes h2,
.packet-content-notes h3,
.packet-content-notes h4,
.packet-content-notes h5,
.packet-content-notes h6 {
  margin-top: 2rem;
  margin-bottom: 0.5rem;
}

.packet-content-notes h2 {
  font-size: clamp(38px, 6vw, 58px);
}

.packet-content-notes h3 {
  font-size: clamp(28px, 4vw, 42px);
}

.packet-content-notes p,
.packet-content-notes li {
  font-size: 1.02rem;
  line-height: 1.7;
}

.packet-content-notes a {
  color: var(--color-accent);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.packet-content-notes a:hover {
  color: var(--color-indigo);
}

@media (max-width: 980px) {
  .packet-hero {
    grid-template-columns: 1fr;
  }

  .packet-title {
    font-size: clamp(52px, 16vw, 96px);
  }
}

@media (max-width: 700px) {
  .packet-hero-main {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
// Load and display Etch stack information
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');

  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;

    try {
      var response = await fetch(etchUrl);
      var data = await response.json();

      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;

      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');

      if (titleEl) titleEl.textContent = stackName;
      if (countEl) countEl.textContent = cardCount + ' card' + (cardCount !== 1 ? 's' : '');

      card.classList.remove('stack-card-loading');
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
      var titleEl = card.querySelector('.stack-card-title');
      if (titleEl) titleEl.textContent = 'Error loading stack';
      card.classList.remove('stack-card-loading');
    }
  });
});
</script>
