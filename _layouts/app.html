---
layout: default
---

<div class="flyer-page">
  <div class="flyer-header">
    <div style="color: var(--c-red); font-family: var(--font-display); font-size: 1.5rem; transform: rotate(-2deg); display: inline-block; margin-bottom: 10px;">DOORBUSTER DEAL!</div>
    <h1>{{ page.title | upcase }}</h1>
    <div style="font-size: 1.5rem; font-weight: bold; background: var(--c-yellow); display: inline-block; padding: 5px 15px; border: 2px solid var(--c-black);">{{ page.tagline }}</div>
    
    <div class="flyer-meta" style="margin-top: 20px;">
      <span class="meta-pill">PLATFORM: {{ page.platform | upcase }}</span>
      <span class="meta-pill">COMPONENTS: {{ page.tech_stack | join: " + " | upcase }}</span>
    </div>
  </div>
  
  <div>
    <a href="{{ page.app_store_link }}" target="_blank" rel="noopener" class="app-buy-btn">
      ADD TO CART (FREE DOWNLOAD!) &darr;
    </a>
  </div>
  
  <div class="flyer-content">
    {{ content }}
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName.toUpperCase();
      if (countEl) countEl.textContent = 'ITEMS: ' + cardCount;
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
    }
  });
});
</script
