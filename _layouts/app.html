---
layout: default
---
<article class="document-wrapper">
  <div class="tape" style="width: 130px; height: 30px; top: -10px; right: 20px; transform: rotate(-5deg);"></div>
  <div class="tape" style="width: 90px; height: 35px; bottom: 20px; right: -20px; transform: rotate(88deg);"></div>
  
  <div class="document-header">
    <div class="document-title">{{ page.title | escape }}</div>
    <div class="document-meta">PLATFORM: {{ page.platform }} | STACK: {{ page.tech_stack | join: ', ' }}</div>
    {% if page.app_store_link %}
    <div class="document-meta">
      <a href="{{ page.app_store_link }}" target="_blank" rel="noopener" style="text-decoration:underline;">[ACCESS DIGITAL EVIDENCE]</a>
    </div>
    {% endif %}
  </div>

  <div class="document-content">
    <h2>{{ page.tagline }}</h2>
    {{ content }}
  </div>
</article>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Subject';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName;
      if (countEl) countEl.textContent = cardCount + ' data points';
    } catch (error) {
      console.error('Failed to access secure server:', etchUrl, error);
    }
  });
});
</script>
