---
layout: default
---

<div class="receipt-app">
  <div style="text-align: center; margin-bottom: 20px;">
    <h1 style="font-size: 2em; margin-bottom: 5px;">{{ page.title | upcase }}</h1>
    <div>** {{ page.tagline | upcase }} **</div>
  </div>
  
  <div style="border: 1px dashed var(--color-ink); padding: 10px; margin-bottom: 20px;">
    <div class="receipt-item"><span>PLATFORM:</span><span>{{ page.platform | upcase }}</span></div>
    <div class="receipt-item"><span>STACK:</span><span>{{ page.tech_stack | join: ", " | upcase }}</span></div>
  </div>
  
  <div style="text-align: center; margin: 30px 0;">
    <a href="{{ page.app_store_link }}" target="_blank" rel="noopener" style="display: inline-block; border: 2px solid var(--color-ink); padding: 10px 20px; font-weight: bold; background: var(--color-ink); color: var(--color-paper); font-size: 1.2em;">
      [ DOWNLOAD INSTALLER ]
    </a>
  </div>
  
  <hr>
  
  <div class="app-content receipt-body-text">
    {{ content }}
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName.toUpperCase();
      if (countEl) countEl.textContent = cardCount + ' CRDS';
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
    }
  });
});
</script>
