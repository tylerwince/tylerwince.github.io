---
layout: default
---

<div class="oracle-page">
  <div class="oracle-header">
    <h1>{{ page.title | upcase }}</h1>
    <div style="font-style: italic; color: var(--parchment); font-size: 1.2rem;">{{ page.tagline }}</div>
    <div class="oracle-meta">
      <span>DOMAIN: {{ page.platform | upcase }}</span>
      <span>SPELLS: {{ page.tech_stack | join: ", " | upcase }}</span>
    </div>
  </div>
  
  <div style="text-align: center; margin: 40px 0;">
    <a href="{{ page.app_store_link }}" target="_blank" rel="noopener" class="download-sigil">
      SUMMON APPLICATION
    </a>
  </div>
  
  <hr>
  
  <div class="oracle-content">
    {{ content }}
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Scroll';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName.toUpperCase();
      if (countEl) countEl.textContent = cardCount + ' RUNES';
    } catch (error) {
      console.error('Failed to summon scroll:', etchUrl, error);
    }
  });
});
</script>
