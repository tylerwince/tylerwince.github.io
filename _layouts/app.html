---
layout: default
---

<article class="article">
  <header class="article-header">
    <div class="article-kicker">{{ page.platform }}</div>
    <h1 class="article-title">{{ page.title }}</h1>
    <div class="article-description">{{ page.tagline }}</div>
  </header>

  <div class="article-meta">
    <div class="meta-item">
      <strong>Built with</strong>
      <span>{{ page.tech_stack | join: ", " }}</span>
    </div>
    <div class="meta-item">
      <strong>Download</strong>
      <a href="{{ page.app_store_link }}" target="_blank" rel="noopener">App Store &rarr;</a>
    </div>
  </div>

  <div class="article-body">
    {{ content }}
  </div>
</article>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stackCards = document.querySelectorAll('.stack-card');
  stackCards.forEach(async function(card) {
    var etchUrl = card.getAttribute('href');
    if (!etchUrl || !etchUrl.endsWith('.etch')) return;
    try {
      var response = await fetch(etchUrl);
      var data = await response.json();
      var stackName = data.data?.stack?.name || 'Unknown Stack';
      var cardCount = data.data?.stack?.flashcards?.length || 0;
      var titleEl = card.querySelector('.stack-card-title');
      var countEl = card.querySelector('.stack-card-count');
      if (titleEl) titleEl.textContent = stackName;
      if (countEl) countEl.textContent = cardCount + ' cards';
    } catch (error) {
      console.error('Failed to load stack:', etchUrl, error);
    }
  });
});
</script>
