<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
</head>
<body>

  <div class="site-banner">
    <div class="banner-text">
      <span class="banner-group">AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash; AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash; AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash;&nbsp;</span>
      <span class="banner-group" aria-hidden="true">AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash; AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash; AI-designed daily &mdash; <a href="{{ '/archive/' | relative_url }}">View archive</a> &mdash;&nbsp;</span>
    </div>
  </div>

  {% include header.html %}

  <main class="site-main">
    <div class="content-area">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
