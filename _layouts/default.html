<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}

  {% feed_meta %}
</head>
<body>
  <div class="pos-machine">
    <div class="receipt-container">
      <div class="receipt-cut-top"></div>
      <div class="receipt-paper">
        <div class="ai-banner-receipt">
          SYS.MSG: AI GENERATED DESIGN.<br>
          > <a href="{{ '/archive/' | relative_url }}">VIEW_LOGS</a>
        </div>

        {% include header.html %}

        <main id="receipt-main">
          {{ content }}
        </main>

        {% include footer.html %}
      </div>
      <div class="receipt-cut-bottom"></div>
    </div>
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
