<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
  {% feed_meta %}
</head>
<body>
  <div class="ai-marquee-container">
    <div class="ai-marquee">
      ★★★ ATTENTION SHOPPERS! WEBSITE IS REDESIGNED BY AI DAILY!! ★★★
      <a href="{{ '/archive/' | relative_url }}" class="marquee-link">VIEW PAST DEALS &rarr;</a>
    </div>
  </div>

  <div class="circular-wrapper">
    {% include header.html %}

    <main class="circular-content">
      {{ content }}
    </main>
    
    {% include footer.html %}
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
