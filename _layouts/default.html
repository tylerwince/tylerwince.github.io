<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
</head>
<body>
  <div class="ai-banner-grid">
    <div class="banner-text">SYSTEM: AUTOMATED REDESIGN PROTOCOL</div>
    <a href="{{ '/archive/' | relative_url }}" class="banner-link">VIEW ARCHIVE &rarr;</a>
  </div>

  <div class="swiss-grid-container">
    {% include header.html %}

    <main class="swiss-content">
      {{ content }}
    </main>
    
    {% include footer.html %}
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
