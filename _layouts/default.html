<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
</head>
<body>
  <div class="site-banner">
    <div class="banner-text">
      <span class="banner-tag">information</span>
      <span class="banner-msg">
        <span class="banner-dot" aria-hidden="true"></span>
        today's design baseline · on time
      </span>
      <span class="banner-side">
        <time class="banner-clock" data-clock aria-label="Local time">--:--:--</time>
        <a href="{{ '/archive/' | relative_url }}">gate → archive</a>
      </span>
    </div>
  </div>

  {% include header.html %}

  <main class="site-main">
    <div class="content-area">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
